name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build exe
        working-directory: src-tauri
        run: cargo build --release --bin codex-usage-limiter --features custom-protocol

      - name: Run backend tests
        working-directory: src-tauri
        run: cargo test --release quota_guard

      - name: Package zip
        shell: pwsh
        run: |
          $name = if ($env:GITHUB_REF_TYPE -eq 'tag') { $env:GITHUB_REF_NAME } else { 'dev' }
          Compress-Archive -Path src-tauri/target/release/codex-usage-limiter.exe -DestinationPath "codex-usage-limiter-$name-windows-x64.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-limiter-windows-x64
          path: codex-usage-limiter-*-windows-x64.zip

      - name: Attach to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $zip = (Get-Item codex-usage-limiter-*-windows-x64.zip).FullName
          gh release upload "$env:GITHUB_REF_NAME" $zip --clobber 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" --title "Codex Usage Limiter $env:GITHUB_REF_NAME" --generate-notes 2>$null
            gh release upload "$env:GITHUB_REF_NAME" $zip --clobber
          }

  macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build app bundle (unsigned)
        run: npm run tauri -- build --bundles app,dmg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-limiter-macos-aarch64
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Attach to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          dmg=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          if ! gh release upload "$GITHUB_REF_NAME" "$dmg" --clobber; then
            gh release create "$GITHUB_REF_NAME" --title "Codex Usage Limiter $GITHUB_REF_NAME" --generate-notes || true
            gh release upload "$GITHUB_REF_NAME" "$dmg" --clobber
          fi

  linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build bundles
        run: npm run tauri -- build --bundles appimage,deb

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-usage-limiter-linux-x86_64
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb

      - name: Attach to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          files=$(ls src-tauri/target/release/bundle/appimage/*.AppImage src-tauri/target/release/bundle/deb/*.deb)
          if ! gh release upload "$GITHUB_REF_NAME" $files --clobber; then
            gh release create "$GITHUB_REF_NAME" --title "Codex Usage Limiter $GITHUB_REF_NAME" --generate-notes || true
            gh release upload "$GITHUB_REF_NAME" $files --clobber
          fi
